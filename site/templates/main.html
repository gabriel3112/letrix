<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monte a Palavra</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='main.css') }}">
</head>
<body>

    <audio id="somAcerto" src="{{ url_for('static', filename='acerto.mp3') }}"></audio>
    <audio id="somErro" src="{{ url_for('static', filename='erro.mp3') }}"></audio>

    <h1>Monte a Palavra</h1>

    <img id="imagem" src="" alt="Imagem da palavra">

    <div id="palavra"></div>
    <div id="letras"></div>
    <div id="mensagem"></div>

    <button id="proxima" onclick="proxima()" style="display: none;">PRÓXIMA</button>

    <script>
        let palavraAlvo = "";
        let palavraAtual = "";

        function iniciar() {
            // Usando caminho relativo em vez de localhost fixo
            fetch("/letrix")
            .then(res => res.json())
            .then(jogo => {
                palavraAlvo = jogo.palavra.toUpperCase();
                palavraAtual = "";
                
                document.getElementById("imagem").src = "/static/" + jogo.imagem;
                document.getElementById("mensagem").innerText = "";
                document.getElementById("proxima").style.display = "none";
                
                criarLetras(palavraAlvo);
                atualizarExibicao();
            })
            .catch(erro => {
                console.error("Erro ao buscar jogo:", erro);
                document.getElementById("mensagem").innerText = "Erro ao carregar o jogo.";
            });
        }

        function criarLetras(palavra) {
            let container = document.getElementById("letras");
            container.innerHTML = "";

            let letras = palavra.split("");
            let extras = ["B","D","F","G","L"];
            let todas = letras.concat(extras);

            // Embaralha as letras
            todas.sort(() => Math.random() - 0.5);

            todas.forEach(letra => {
                let btn = document.createElement("button");
                btn.innerText = letra;

                btn.onclick = function() {
                    verificarLetra(letra, btn);
                }
                container.appendChild(btn);
            });
        }

        function verificarLetra(letra, botao) {
            // Verifica se a letra clicada é a próxima letra correta da palavra
            let proximoIndice = palavraAtual.length;
            
            if (palavraAlvo[proximoIndice] === letra) {
                palavraAtual += letra;
                botao.disabled = true; // Desativa o botão após o acerto
                botao.style.backgroundColor = "#ccc";
                
                atualizarExibicao();

                if (palavraAtual === palavraAlvo) {
                    document.getElementById("somAcerto").play();
                    document.getElementById("mensagem").innerText = "Parabéns! 🎉";
                    document.getElementById("proxima").style.display = "inline-block";
                }
            } else {
                document.getElementById("somErro").play();
                botao.classList.add("erro-animacao");
                setTimeout(() => botao.classList.remove("erro-animacao"), 300);
            }
        }

        function atualizarExibicao() {
            let resultado = "";
            for (let i = 0; i < palavraAlvo.length; i++) {
                resultado += (palavraAtual[i] || "_") + " ";
            }
            document.getElementById("palavra").innerText = resultado;
        }

        function proxima() {
            iniciar();
        }

        iniciar();
    </script>
</body>
</html>
